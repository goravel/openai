name: Test
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  ubuntu:
    strategy:
      matrix:
        go: ["1.25", "1.26"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Install dependencies
        run: go mod tidy
      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: go test -timeout 10m ./...
